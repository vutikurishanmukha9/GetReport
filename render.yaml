# GetReport Render Blueprint
#
# Services:
#   1. Backend API + Celery worker, deployed as one Docker web service.
#   2. Frontend, deployed as a Render static site.
#
# External services to configure in Render:
#   - DATABASE_URL: Neon/Postgres connection string.
#   - REDIS_URL: Redis broker/backend URL.
#   - OPENAI_API_KEY: OpenAI API key.

services:
  - type: web
    name: getreport-backend
    runtime: docker
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PDF_ENGINE
        value: weasyprint
      - key: CORS_ORIGINS
        value: https://getreport-frontend.onrender.com,https://getreport.vercel.app,http://localhost:5173
      - key: SKEWNESS_THRESHOLD
        value: "1.0"
      - key: STORAGE_TYPE
        value: db
      - key: MAX_CONTENT_LENGTH
        value: "52428800"
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: static
    name: getreport-frontend
    buildCommand: cd Frontend && npm ci && npm run build
    staticPublishPath: ./Frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://getreport-backend.onrender.com/api
